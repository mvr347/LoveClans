  base-members: 10
  members-per-upgrade: 3
  base-territories: 4
  territories-per-level: 1
  territories-per-upgrade: 2
  experience-percent-per-upgrade: 5.0
  base-chest-rows: 3
  max-chest-rows: 6

leveling:
  base-exp: 100
  multiplier: 1.83
  territory-claim-exp: 150
  war-win-exp: 1200
  ritual-exp: 250

upgrades:
  MEMBERS:
    max-level: 5
  TERRITORIES:
    max-level: 5
  EXPERIENCE:
    max-level: 5
  # Уровни этого улучшения = число рядов сундука сверх базового (limits.base-chest-rows).
  # max-level здесь должен совпадать с (limits.max-chest-rows - limits.base-chest-rows).
  CHEST:
    max-level: 3

# Клановые перки (§7) — доступны с perks.unlock-level, один активный за раз, смена стоит
# опыта клана после первого (бесплатного) выбора.
