database:
  type: SQLITE # SQLITE or MYSQL
  pool-size: 4
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""
    use-ssl: false
    properties:
      cachePrepStmts: true
      prepStmtCacheSize: 250
      prepStmtCacheSqlLimit: 2048

clans:
  tag:
    min-length: 3
    max-length: 6
    pattern: "^[A-Za-z0-9_]+$"
  name:
    min-length: 4
    max-length: 10
  default-tag-color: "<gold>"
  available-colors:
    white: { tag: "<white>", material: WHITE_WOOL, name: "Белый" }
    gray: { tag: "<gray>", material: GRAY_WOOL, name: "Серый" }
    dark_gray: { tag: "<dark_gray>", material: GRAY_TERRACOTTA, name: "Тёмно-серый" }
    black: { tag: "<black>", material: BLACK_WOOL, name: "Чёрный" }
    red: { tag: "<red>", material: RED_WOOL, name: "Красный" }
    dark_red: { tag: "<dark_red>", material: RED_TERRACOTTA, name: "Тёмно-красный" }
    gold: { tag: "<gold>", material: ORANGE_WOOL, name: "Золотой" }
    yellow: { tag: "<yellow>", material: YELLOW_WOOL, name: "Жёлтый" }
    green: { tag: "<green>", material: LIME_WOOL, name: "Зелёный" }
    dark_green: { tag: "<dark_green>", material: GREEN_WOOL, name: "Тёмно-зелёный" }
    aqua: { tag: "<aqua>", material: LIGHT_BLUE_WOOL, name: "Голубой" }
    dark_aqua: { tag: "<dark_aqua>", material: CYAN_WOOL, name: "Бирюзовый" }
    blue: { tag: "<blue>", material: BLUE_WOOL, name: "Синий" }
    dark_blue: { tag: "<dark_blue>", material: BLUE_TERRACOTTA, name: "Тёмно-синий" }
    light_purple: { tag: "<light_purple>", material: MAGENTA_WOOL, name: "Розовый" }
    dark_purple: { tag: "<dark_purple>", material: PURPLE_WOOL, name: "Фиолетовый" }
  default-emblem: WHITE_BANNER
  invite-expire-seconds: 120
  friendly-fire: false

limits:
  max-level: 20
  base-members: 10
  members-per-upgrade: 3
  base-territories: 4
  territories-per-level: 1
  base-chest-rows: 3
  max-chest-rows: 6

leveling:
  base-exp: 100
  multiplier: 1.83
  territory-claim-exp: 150
  war-win-exp: 1200
  ritual-exp: 250

upgrades:
  MEMBERS:
    max-level: 5
  CHEST:
    max-level: 3
  SPIRIT_CAPACITY:
    max-level: 10
  SPIRIT_REGEN:
    max-level: 10

mechanics:
  spirit:
    enabled: true
    tick-seconds: 15
    base-radius: 48
    level-radius-bonus: 4
    buffs:
      1:
        - "SPEED:0"
      5:
        - "SPEED:1"
        - "HASTE:0"
      10:
        - "SPEED:1"
        - "HASTE:1"
        - "RESISTANCE:0"
      15:
        - "SPEED:2"
        - "HASTE:1"
        - "RESISTANCE:0"
      20:
        - "SPEED:2"
        - "HASTE:2"
        - "RESISTANCE:1"
  rituals:
    cooldown-hours: 24
    duration-seconds: 600
  succession:
    offline-days-trigger: 14
    vote-duration-hours: 48
    quorum-percent: 50
  artifacts:
    war-horn-cooldown-seconds: 300

integration:
  advanced-claims:
    enabled: true
    auto-claim-chunk: true
    claim-radius: 12 # Radius for AdvancedClaims (25x25x25 area)
    border-display-ticks: 100 # Duration in ticks for showing claim border (5 seconds)
    api-class: "me.lovelace.advancedclaims.api.AdvancedClaimsAPI"
    trust-level-class: "me.lovelace.advancedclaims.model.TrustLevel"
    trust-mapping:
      GUILDMASTER: OWNER
      ASSISTANT: BUILD
      MEMBER: INTERACT
    # Reflection method candidates are resolved automatically. Keep this block for forks.
    methods:
      get-instance: getInstance
      create-claim: createClaim
      delete-claim: deleteClaim
      get-claim-by-id: getClaimById
      add-player: addPlayerToClaim
      remove-player: removePlayerFromClaim