clan:
  help:
    in-clan: |
      <prefix><gold>Команды клана:</gold>
      <yellow>/clan</yellow> <gray>- Открыть главное меню</gray>
      <yellow>/clan menu</yellow> <gray>- Открыть меню клана</gray>
      <yellow>/clan members</yellow> <gray>- Участники</gray>
      <yellow>/clan territories</yellow> <gray>- Территории</gray>
      <yellow>/clan upgrades</yellow> <gray>- Улучшения</gray>
      <yellow>/clan settings</yellow> <gray>- Настройки клана</gray>
      <yellow>/clan applications</yellow> <gray>- Заявки (гильдмастер)</gray>
      <yellow>/clan invite <player></yellow> <gray>- Пригласить игрока</gray>
      <yellow>/clan kick <player></yellow> <gray>- Исключить игрока</gray>
      <yellow>/clan promote <player></yellow> <gray>- Повысить</gray>
      <yellow>/clan demote <player></yellow> <gray>- Понизить</gray>
      <yellow>/clan claim</yellow> <gray>- Захватить чанк</gray>
      <yellow>/clan unclaim</yellow> <gray>- Освободить чанк</gray>
      <yellow>/clan war <tag></yellow> <gray>- Объявить войну</gray>
      <yellow>/clan peace <tag></yellow> <gray>- Предложить мир</gray>
      <yellow>/clan diplo [tag]</yellow> <gray>- Дипломатия (или /cd)</gray>
      <yellow>/clan leave</yellow> <gray>- Покинуть клан</gray>
      <yellow>/clan disband</yellow> <gray>- Распустить клан</gray>
      <yellow>/clan home</yellow> <gray>- Телепортироваться домой</gray>
    not-in-clan: |
      <prefix><gold>Команды без клана:</gold>
      <yellow>/clan</yellow> <gray>- Открыть список кланов и подать заявку</gray>
      <yellow>/clan list</yellow> <gray>- Открыть список кланов</gray>
      <yellow>/clan create</yellow> <gray>- Создать клан</gray>
      <yellow>/clan accept <tag></yellow> <gray>- Принять приглашение</gray>
      <yellow>/clan info <tag></yellow> <gray>- Информация о клане</gray>
    console: |
      <prefix><gold>Команды консоли:</gold>
      <yellow>/clan reload</yellow> <gray>- Перезагрузить плагин</gray>
      <yellow>/clan info <tag></yellow> <gray>- Информация о клана</gray>
      <yellow>/clan artifact <type></yellow> <gray>- Выдать артефакт</gray>
    admin: |
      <prefix><gold>Команды админа:</gold>
      <yellow>/clansadmin exp add|remove|set <tag> <amount></yellow> <gray>- Управление опытом клана</gray>
      <yellow>/clansadmin points add|remove|set <tag> <amount></yellow> <gray>- Управление очками улучшений</gray>
      <yellow>/clansadmin diplo <tag1> <tag2> <relation></yellow> <gray>- Управление дипломатией</gray>
      <yellow>/clansadmin war start|end <tag1> <tag2></yellow> <gray>- Управление войнами</gray>
      <yellow>/clansadmin disband <tag></yellow> <gray>- Принудительно удалить клан</gray>
      <yellow>/clansadmin setspirit <tag> <level></yellow> <gray>- Установить уровень духа</gray>
    usage:
      create: "<prefix><yellow>Использование: /clan create"
      invite: "<prefix><yellow>Использование: /clan invite <player>"
      accept: "<prefix><yellow>Использование: /clan accept <tag>"
      kick: "<prefix><yellow>Использование: /clan kick <player>"
      rank: "<prefix><yellow>Использование: /clan promote|demote <player>"
      war: "<prefix><yellow>Использование: /clan war <tag>"
      diplomacy: "<prefix><yellow>Использование: /clan diplo <tag>"
      ritual: "<prefix><yellow>Использование: /clan ritual <type>"
      vote: "<prefix><yellow>Использование: /clan vote <player>"
      artifact: "<prefix><yellow>Использование: /clan artifact <type>"
      admin-war: "<prefix><yellow>Использование: /clansadmin war start|end <tag1> <tag2>"
      admin-diplo: "<prefix><yellow>Использование: /clansadmin diplo <tag1> <tag2> ALLY|ENEMY|NEUTRAL"
      admin-disband: "<prefix><yellow>Использование: /clansadmin disband <tag>"
      admin-spirit: "<prefix><yellow>Использование: /clansadmin setspirit <tag> <level>"

