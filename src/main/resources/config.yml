database:
  type: SQLITE # SQLITE or MYSQL
  pool-size: 4
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""
    use-ssl: false
    properties:
      cachePrepStmts: true
      prepStmtCacheSize: 250
      prepStmtCacheSqlLimit: 2048

clans:
  tag:
    min-length: 3
    max-length: 6
    pattern: "^[A-Za-z0-9_]+$"
  name:
    min-length: 4
    max-length: 10
    # pattern — белый список символов для названия клана. Название рендерится без экранирования
    # через PlaceholderAPI (см. PlaceholderAPIHook), поэтому запрещаем управляющие символы и
    # последовательности, которые можно использовать для инъекции MiniMessage/легаси цветовых кодов
    # (символы "<", ">", "&", "§"). Буквы разрешены в широком unicode-диапазоне (кириллица и т.д.),
    # также разрешены пробелы, цифры, дефис и подчёркивание.
    pattern: "^[\\p{L}\\p{N} _-]+$"
  creation-cooldown-seconds: 86400
  # creation-cost — количество предмета creation-cost-item, списываемое с игрока при создании клана.
  # Экономика ItemsAdder, а не Vault: на сервере нет плагина-экономики, и добавлять его не нужно.
  creation-cost: 10000
  # creation-cost-item — ItemsAdder ID предмета (namespace:id), которым оплачивается создание клана.
  # Если оставить пустым, плата за создание не взимается (штраф отключён), даже если creation-cost > 0.
  creation-cost-item: ""
  rejoin-cooldown-seconds: 3600
  default-tag-color: "<gold>"
  # dye-color — имя org.bukkit.DyeColor, используется для окраски щитов в цвет клана (см. ShieldColorManager).
  # Указано явно, а не выведено из material, так как *_TERRACOTTA не соответствует напрямую DyeColor.
  available-colors:
    white: { tag: "<white>", material: WHITE_WOOL, name: "Белый", dye-color: WHITE }
    gray: { tag: "<gray>", material: GRAY_WOOL, name: "Серый", dye-color: LIGHT_GRAY }
    dark_gray: { tag: "<dark_gray>", material: GRAY_TERRACOTTA, name: "Тёмно-серый", dye-color: GRAY }
    black: { tag: "<black>", material: BLACK_WOOL, name: "Чёрный", dye-color: BLACK }
    red: { tag: "<red>", material: RED_WOOL, name: "Красный", dye-color: RED }
    dark_red: { tag: "<dark_red>", material: RED_TERRACOTTA, name: "Тёмно-красный", dye-color: RED }
    gold: { tag: "<gold>", material: ORANGE_WOOL, name: "Золотой", dye-color: ORANGE }
    yellow: { tag: "<yellow>", material: YELLOW_WOOL, name: "Жёлтый", dye-color: YELLOW }
    green: { tag: "<green>", material: LIME_WOOL, name: "Зелёный", dye-color: LIME }
    dark_green: { tag: "<dark_green>", material: GREEN_WOOL, name: "Тёмно-зелёный", dye-color: GREEN }
    aqua: { tag: "<aqua>", material: LIGHT_BLUE_WOOL, name: "Голубой", dye-color: LIGHT_BLUE }
    dark_aqua: { tag: "<dark_aqua>", material: CYAN_WOOL, name: "Бирюзовый", dye-color: CYAN }
    blue: { tag: "<blue>", material: BLUE_WOOL, name: "Синий", dye-color: BLUE }
    dark_blue: { tag: "<dark_blue>", material: BLUE_TERRACOTTA, name: "Тёмно-синий", dye-color: BLUE }
    light_purple: { tag: "<light_purple>", material: MAGENTA_WOOL, name: "Розовый", dye-color: MAGENTA }
    dark_purple: { tag: "<dark_purple>", material: PURPLE_WOOL, name: "Фиолетовый", dye-color: PURPLE }
  default-emblem: WHITE_BANNER
  invite-expire-seconds: 120
  friendly-fire: false

  # Общий клановый сундук (§2, /clan chest) — единое хранилище денег (currency-item, отдельный
  # слот) и предметов (обычное хранилище). Заменяет прежний отдельный /clan bank. Новые ряды
  # предметов разблокируются улучшением "Сундук" (upgrades.CHEST), а не покупкой за деньги.
  # base-chest-rows/max-chest-rows заданы в limits.
  chest:
    currency-item: 'currency:gold_coin'
    tax:
      # С какого уровня клана начинает взиматься налог (1-2 уровень — без налога).
      tax-free-until-level: 3
      base-amount: 1000
      percent-per-member: 0.05
      percent-per-extra-row: 0.10

  # Эмбарго/блокада/письма (§5). Влияние для блокады берётся из influence.blockade-multiplier.
  diplomacy:
    letter-max-length: 256

  # Клановые обеты (§1) — раздельные пулы: 20 еженедельных (один "контракт недели" детерминированно
  # выбирается из пула на каждую календарную неделю пн-вс) и 40 ежедневных (3-5 случайных выходят
  # в ротацию каждый день в 00:00). Клан может вести один активный обет каждого типа одновременно.
  # npc-id — числовой ID NPC-Маршала (Citizens), привязывается командой
  # /clansadmin createnpc contracts, стоя рядом с уже созданным через ванильный /npc create NPC;
  # -1 отключает взаимодействие с NPC (GUI всё равно доступно через /clan contracts).
  #
  # Сложность (§1.2): множитель = difficulty.base + (Члены-1) × difficulty.per-member-step,
  # применяется к целям объективов, наградам и (только для ежедневных) сроку выполнения.
  # penalty-percent — доля от (уже отмасштабленной) награды, вычитаемая из опыта клана, если обет
  # не выполнен к дедлайну.
  contracts:
    npc-id: -1
    npc-bind-distance: 6.0
    tick-interval-minutes: 5
    penalty-percent: 80
    difficulty:
      base: 1.0
      per-member-step: 0.15
    weekly:
