database:
  type: SQLITE # SQLITE or MYSQL
  pool-size: 4
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""
    use-ssl: false
    properties:
      cachePrepStmts: true
      prepStmtCacheSize: 250
      prepStmtCacheSqlLimit: 2048

clans:
  tag:
    min-length: 3
    max-length: 6
    pattern: "^[A-Za-z0-9_]+$"
  name:
    min-length: 4
    max-length: 10
    # pattern — белый список символов для названия клана. Название рендерится без экранирования
    # через PlaceholderAPI (см. PlaceholderAPIHook), поэтому запрещаем управляющие символы и
    # последовательности, которые можно использовать для инъекции MiniMessage/легаси цветовых кодов
    # (символы "<", ">", "&", "§"). Буквы разрешены в широком unicode-диапазоне (кириллица и т.д.),
    # также разрешены пробелы, цифры, дефис и подчёркивание.
    pattern: "^[\\p{L}\\p{N} _-]+$"
  creation-cooldown-seconds: 86400
  # creation-cost — количество предмета creation-cost-item, списываемое с игрока при создании клана.
  # Экономика ItemsAdder, а не Vault: на сервере нет плагина-экономики, и добавлять его не нужно.
  creation-cost: 10000
  # creation-cost-item — ItemsAdder ID предмета (namespace:id), которым оплачивается создание клана.
  # Если оставить пустым, плата за создание не взимается (штраф отключён), даже если creation-cost > 0.
  creation-cost-item: ""
  rejoin-cooldown-seconds: 3600
  default-tag-color: "<gold>"
  # dye-color — имя org.bukkit.DyeColor, используется для окраски щитов в цвет клана (см. ShieldColorManager).
  # Указано явно, а не выведено из material, так как *_TERRACOTTA не соответствует напрямую DyeColor.
  available-colors:
    white: { tag: "<white>", material: WHITE_WOOL, name: "Белый", dye-color: WHITE }
    gray: { tag: "<gray>", material: GRAY_WOOL, name: "Серый", dye-color: LIGHT_GRAY }
    dark_gray: { tag: "<dark_gray>", material: GRAY_TERRACOTTA, name: "Тёмно-серый", dye-color: GRAY }
    black: { tag: "<black>", material: BLACK_WOOL, name: "Чёрный", dye-color: BLACK }
    red: { tag: "<red>", material: RED_WOOL, name: "Красный", dye-color: RED }
    dark_red: { tag: "<dark_red>", material: RED_TERRACOTTA, name: "Тёмно-красный", dye-color: RED }
    gold: { tag: "<gold>", material: ORANGE_WOOL, name: "Золотой", dye-color: ORANGE }
    yellow: { tag: "<yellow>", material: YELLOW_WOOL, name: "Жёлтый", dye-color: YELLOW }
    green: { tag: "<green>", material: LIME_WOOL, name: "Зелёный", dye-color: LIME }
    dark_green: { tag: "<dark_green>", material: GREEN_WOOL, name: "Тёмно-зелёный", dye-color: GREEN }
    aqua: { tag: "<aqua>", material: LIGHT_BLUE_WOOL, name: "Голубой", dye-color: LIGHT_BLUE }
    dark_aqua: { tag: "<dark_aqua>", material: CYAN_WOOL, name: "Бирюзовый", dye-color: CYAN }
    blue: { tag: "<blue>", material: BLUE_WOOL, name: "Синий", dye-color: BLUE }
    dark_blue: { tag: "<dark_blue>", material: BLUE_TERRACOTTA, name: "Тёмно-синий", dye-color: BLUE }
    light_purple: { tag: "<light_purple>", material: MAGENTA_WOOL, name: "Розовый", dye-color: MAGENTA }
    dark_purple: { tag: "<dark_purple>", material: PURPLE_WOOL, name: "Фиолетовый", dye-color: PURPLE }
  default-emblem: WHITE_BANNER
  invite-expire-seconds: 120
  friendly-fire: false

  # Общий клановый сундук (§2, /clan chest) — единое хранилище денег (currency-item, отдельный
  # слот) и предметов (обычное хранилище). Заменяет прежний отдельный /clan bank. Новые ряды
  # предметов разблокируются улучшением "Сундук" (upgrades.CHEST), а не покупкой за деньги.
  # base-chest-rows/max-chest-rows заданы в limits.
  chest:
    currency-item: 'currency:gold_coin'
    tax:
      # С какого уровня клана начинает взиматься налог (1-2 уровень — без налога).
      tax-free-until-level: 3
      base-amount: 1000
      percent-per-member: 0.05
      percent-per-extra-row: 0.10

  # Клановые обеты (контракты) — раз в неделю лидер клана выбирает один обет у NPC-Маршала
  # (Citizens). npc-id — числовой ID NPC (узнаётся через /npc id, стоя рядом с ним); -1 отключает
  # взаимодействие с NPC (GUI всё равно доступно через /clan contracts).
  #
  # Обет Крови использует систему bounty LoveHunt через reflection (BountyClaimEvent) — если
  # LoveHunt не установлен или бридж клановых bounty на его стороне не работает, прогресс по
  # этому обету просто не будет засчитываться, без ошибок.
  #
  # Обет Очищения — в этой кодовой базе нет системы данжей, поэтому здесь он реализован как
  # "уничтожить boss-type N раз всем кланом" (обычный EntityDeathEvent).
  contracts:
    npc-id: -1
    labor:
      name: 'Обет Труда'
      description: 'Суммарно всем кланом накопать 5000 единиц любой руды.'
      progress-format: '<gray>Добыто руды: <white>{current_progress}</white>/{target_amount}'
      target-ore: 5000
      reward-item: 'currency:gold_coin'
      reward-amount: 5000
    blood:
      name: 'Обет Крови'
      description: 'Сдать 10 голов игроков из враждебных кланов через bounty.'
      progress-format: '<gray>Сдано наёмников: <white>{current_progress}</white>/{target_amount}'
      target-kills: 10
      reward-item: 'currency:gold_coin'
      reward-amount: 8000
    purification:
      name: 'Обет Очищения'
      description: 'Уничтожить опасного босса 5 раз всем кланом.'
      progress-format: '<gray>Уничтожено боссов: <white>{current_progress}</white>/{target_amount}'
      boss-type: 'WITHER'
      target-kills: 5
      reward-item: 'currency:gold_coin'
      reward-amount: 10000

limits:
  max-level: 20
  base-members: 10
  members-per-upgrade: 3
  base-territories: 4
  territories-per-level: 1
  territories-per-upgrade: 2
  experience-percent-per-upgrade: 5.0
  base-chest-rows: 3
  max-chest-rows: 6

leveling:
  base-exp: 100
  multiplier: 1.83
  territory-claim-exp: 150
  war-win-exp: 1200
  ritual-exp: 250

upgrades:
  MEMBERS:
    max-level: 5
  TERRITORIES:
    max-level: 5
  EXPERIENCE:
    max-level: 5
  # Уровни этого улучшения = число рядов сундука сверх базового (limits.base-chest-rows).
  # max-level здесь должен совпадать с (limits.max-chest-rows - limits.base-chest-rows).
  CHEST:
    max-level: 3

# Клановые перки (§7) — доступны с perks.unlock-level, один активный за раз, смена стоит
# опыта клана после первого (бесплатного) выбора.
perks:
  unlock-level: 5
  respec-cost-experience: 10000
  tick-seconds: 15
  harvester:
    crop-growth-bonus-percent: 40
    harvest-yield-bonus-percent: 10
    pvp-bonus-hearts: 2
  miner:
    resource-yield-bonus-percent: 25
    rare-drop-bonus-percent: 15
    ore-break-particle: HAPPY_VILLAGER
  warrior:
    banner-damage-bonus-percent: 10
    siege-duration-reduction-percent: 25

mechanics:
  afk:
    threshold-seconds: 120
  spirit:
    enabled: true
    tick-seconds: 15
    base-radius: 48
    level-radius-bonus: 4
    buffs:
      1:
        - "SPEED:0"
      5:
        - "SPEED:1"
        - "HASTE:0"
      10:
        - "SPEED:1"
        - "HASTE:1"
        - "RESISTANCE:0"
      15:
        - "SPEED:2"
        - "HASTE:1"
        - "RESISTANCE:0"
      20:
        - "SPEED:2"
        - "HASTE:2"
        - "RESISTANCE:1"
  rituals:
    cooldown-hours: 24
    duration-seconds: 600
  succession:
    offline-days-trigger: 14
    vote-duration-hours: 48
    quorum-percent: 50
  artifacts:
    war-horn-cooldown-seconds: 300

# Влияние клана — производный показатель авторитета клана на сервере, пересчитывается
# автоматически при изменении числа участников, завершении войны/осады/набега, повышении
# уровня клана и трате очков улучшений (см. InfluenceManager).
influence:
  member-weight: 10
  level-weight: 5
  upgrade-point-weight: 20
  war-win-weight: 50
  war-loss-weight: 25
  siege-win-weight: 75
  siege-loss-weight: 40
  raid-win-weight: 30
  raid-loss-weight: 15
  # Клан А может устроить блокаду клану Б только если Влияние(А) >= Влияние(Б) * blockade-multiplier.
  blockade-multiplier: 1.5
  # Клан нельзя выбрать целью набега, если его влияние >= (средний уровень кланов сервера) * raid-immunity-multiplier.
  raid-immunity-multiplier: 2.0

war:
  # Таймер (босс-бар) между объявлением войны и её реальным началом (баннеры, компасы,
  # осадный режим территории появляются только после этого таймера).
  pre-start-minutes: 10
  duration-minutes: 30
  cooldown-hours: 24
  # Сколько времени вражеский клан должен непрерывно удерживать сломанное знамя территории,
  # прежде чем клан-защитник автоматически проигрывает войну и распускается.
  banner-capture-minutes: 3
  # Сколько ударов подряд нужно нанести по вражескому знамени, прежде чем оно сломается
  # (знамя больше не ломается с одного удара во время войны).
  banner-break-hits: 5
  # Если по знамени не бьют дольше этого времени, прогресс поломки сбрасывается.
  banner-break-progress-reset-seconds: 15

# Осада (§3) — второй тип конфликта клана: атакующие ставят осадные лагеря вокруг территории
# защитника, каждый лагерь должен продержаться duration-minutes без разрушения, чтобы осада
# прорвалась. Как и война, начинается не сразу, а после pre-start-minutes (босс-бар).
siege:
  pre-start-minutes: 20
  duration-minutes: 20
  cooldown-hours: 24
  min-attacker-online: 1
  min-defender-online: 5
  max-concurrent: 3
  camp-count-min: 3
  camp-count-max: 4
  camp-distance-blocks: 50
  camp-respawn-minutes: 2
  # Доля сундука защитника, которую получает победивший атакующий (случайно между min/max).
  win-chest-percent-min: 25
  win-chest-percent-max: 30
  reward-artifact: true

integration:
  advanced-claims:
    enabled: true
    auto-claim-chunk: true
    claim-radius: 35 # Radius for LoveClaims (71x71x71 area)
    border-display-ticks: 100 # Duration in ticks for showing claim border (5 seconds)
    trust-mapping:
      LEADER: OWNER
      GUARDIAN: BUILD
      MEMBER: CONTAINER
      RECRUIT: CONTAINER