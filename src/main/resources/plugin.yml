name: LoveClans
version: '${project.version}'
main: me.lovelace.loveclans.LoveClansPlugin
api-version: '1.21.11'
authors: [ lovelace ]
description: Full-featured clans, guild wars, territories and LoveClaims integration.
softdepend:
  - LoveClaims
  - LoveTrades
  - PlaceholderAPI
  - ItemsAdder
  - Citizens
  - LoveHunt

commands:
  loveclan:
    description: Main clans command.
    usage: /loveclan
    aliases: [ clan, c ]
  diplo:
    description: Open clan diplomacy menu.
    usage: /diplo [tag]
    aliases: [ cd ]
  loveclans:
    description: Open clan list.
    usage: /loveclans
    aliases: [ clans ]
  loveclansadmin:
    description: Admin commands for LoveClans plugin.
    usage: /loveclansadmin <reload|delete|setspirit>
    aliases: [ clansadmin, ca ]

permissions:
  loveclans.command:
    default: true
  loveclans.create:
    default: true
  loveclans.disband:
    default: true
  loveclans.invite:
    default: true
  loveclans.accept:
    default: true
  loveclans.leave:
    default: true
  loveclans.kick:
    default: true
  loveclans.rank:
    default: true
  loveclans.claim:
    default: true
  loveclans.unclaim:
    default: true
  loveclans.menu:
    default: true
  loveclans.chest:
    default: true
  loveclans.ritual:
    default: true
  loveclans.war:
    default: true
  loveclans.diplomacy:
    default: true
  loveclans.settings:
    default: true
  loveclans.applications:
    default: true
  loveclans.vote:
    default: true
  loveclans.admin:
    default: op
  loveclans.home:
    default: true
  # Deprecated nodes kept for backward compatibility with existing permission
  # setups configured before the LoveClans rebrand. New installs should use
  # the loveclans.* nodes above; these are checked as a fallback in code.
  clans.command:
    default: true
  clans.create:
    default: true
  clans.disband:
    default: true
  clans.invite:
    default: true
  clans.accept:
    default: true
  clans.leave:
    default: true
  clans.kick:
    default: true
  clans.rank:
    default: true
  clans.claim:
    default: true
  clans.unclaim:
    default: true
  clans.menu:
    default: true
  clans.chest:
    default: true
  clans.ritual:
    default: true
  clans.war:
    default: true
  clans.diplomacy:
    default: true
  clans.settings:
    default: true
  clans.applications:
    default: true
  clans.vote:
    default: true
  clans.admin:
    default: op
  clans.home:
    default: true
